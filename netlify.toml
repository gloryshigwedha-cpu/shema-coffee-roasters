[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers applied to all routes
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Stop MIME type sniffing
    X-Content-Type-Options = "nosniff"
    # Control referrer info
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable browser features not needed
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # XSS protection for older browsers
    X-XSS-Protection = "1; mode=block"
    # HTTPS enforcement (HSTS) - 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content Security Policy
    # - default-src: only self
    # - script-src: self + inline (needed for React)
    # - style-src: self + inline + Google Fonts
    # - img-src: self + data URIs + Unsplash (demo images)
    # - connect-src: self + Supabase
    # - font-src: Google Fonts CDN
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://*.supabase.co; connect-src 'self' https://*.supabase.co https://*.supabase.io; frame-src 'none'; object-src 'none';"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache the HTML entry point (ensures fresh deploys)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
